# SecureWiki Samba configuration
# Rabbit hole: anonymous Marketing share

[global]
   workgroup = WORKGROUP
   server string = %h server (Samba, Ubuntu)
   server role = standalone server
   log file = /var/log/samba/log.%m
   max log size = 1000
   logging = file

   # Guest / Anonymous setup
   map to guest = Bad User
   guest account = nobody
   server min protocol = NT1
   client min protocol = NT1

   # Disable user-share creation by ordinary users
   usershare allow guests = no
   usershare max shares = 0

   # Authentication
   security = user
   passdb backend = tdbsam
   obey pam restrictions = no
   unix password sync = no

[Marketing]
   path = /srv/samba/marketing
   browseable = yes
   read only = yes
   guest ok = yes
   guest only = yes
   public = yes
   force user = nobody
   comment = Public Marketing Material (READ-ONLY)
